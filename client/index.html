<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Metalu Cliente</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" href="icons/icon.png" />
  </head>
  <body>
    <div class="wrap">
      <div class="logo">Metalu</div>
      <div class="spinner" id="spinner"></div>
      <div class="status" id="status">Conectando al servidor del taller...</div>
    </div>
    <script>
      // The server IP is fixed for this workshop LAN.
      // To change it: edit this file and rebuild the client, OR use the
      // separate config.txt path (TODO if requested).
      const SERVER_URL = "http://192.168.1.21:3000";

      // Tiny grace period so the spinner is visible; otherwise the redirect
      // happens before paint on slow hardware.
      window.addEventListener("DOMContentLoaded", () => {
        setTimeout(() => {
          window.location.replace(SERVER_URL);
        }, 250);
      });
    </script>
    <noscript>
      <div class="status err">
        Este programa necesita JavaScript habilitado para abrir Metalu.
      </div>
    </noscript>
  </body>
</html>
