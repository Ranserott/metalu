name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      # Prisma writes its generated client to src/generated/prisma (per
      # generator block in prisma/schema.prisma), which is gitignored, so
      # `npm ci` doesn't materialise it. Tests import from `@/generated/prisma`
      # via the `@` alias in vitest.config.ts, so without this step the path
      # is unresolvable and every test that touches Prisma errors with
      # "Cannot find package '@/generated/prisma'".
      - run: npx prisma generate
      - run: npx vitest run

  build-server:
    needs: unit-tests
    runs-on: windows-latest
    # PKG v6.21.0 (pkg-fetch v3.6.4) hardcodes fetch from
    # https://github.com/yao-pkg/pkg-fetch/releases/download/v3.6/node-v20.20.2-win-x64
    # but that file is MISSING from the v3.6 release. The identical binary lives
    # under v3.5 with the same sha256, so pre-populate the cache dir PKG looks in.
    # Without this, PKG falls back to a from-source Node build that fails because
    # the windows-latest runner ships only VS 2026 (PKG's build script only
    # recognizes VS 2019/2022).
    #
    # PKG reads $PKG_CACHE_PATH before falling back to os.homedir() — we set it
    # explicitly to a stable path because bash `$HOME` (C:\Users\runneradmin) and
    # Node's os.homedir() can diverge (8.3 short names like RUNNER~1) and the
    # pre-fetched file would otherwise be invisible to PKG.
    env:
      PKG_CACHE_PATH: C:/pkg-cache
      PKG_NODE_PATH: C:/pkg-cache/v3.6/fetched-node-v20.20.2-win-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      # Same as unit-tests — see comment there.
      - run: npx prisma generate
      - name: pre-fetch PKG base binary from v3.5
        shell: bash
        run: |
          mkdir -p "C:/pkg-cache/v3.6"
          curl -fsSL \
            -o "C:/pkg-cache/v3.6/fetched-node-v20.20.2-win-x64" \
            "https://github.com/yao-pkg/pkg-fetch/releases/download/v3.5/node-v20.20.2-win-x64"
          EXPECTED="f9b870a1b20c3bcf729a53112b6a72db65b050e4e6494d33ceab3413c507f01c"
          ACTUAL=$(sha256sum "C:/pkg-cache/v3.6/fetched-node-v20.20.2-win-x64" | awk '{print $1}')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "SHA mismatch: expected $EXPECTED got $ACTUAL"
            exit 1
          fi
          echo "pre-fetched node-v20.20.2-win-x64 OK (sha256 verified)"
      - run: npm run build:server
      - name: assert exe exists
        run: |
          if (!(Test-Path "dist-server/metalu-server.exe")) {
            Write-Error "metalu-server.exe not produced"
            exit 1
          }
          $size = (Get-Item "dist-server/metalu-server.exe").Length
          Write-Host "metalu-server.exe size: $size bytes"
          if ($size -lt 50MB -or $size -gt 350MB) {
            Write-Error "exe size out of expected range (50-350MB)"
            exit 1
          }
      - uses: actions/upload-artifact@v4
        with:
          name: metalu-server
          path: dist-server/metalu-server.exe



  smoke:
    needs: [build-server]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: metalu-server
          path: dist-server
      - name: smoke test server
        run: |
          $env:HOSTNAME = "0.0.0.0"
          Write-Host "Starting server with HOSTNAME=$env:HOSTNAME"
          Start-Process -FilePath "dist-server/metalu-server.exe" -PassThru |
            Tee-Object -Variable proc
          Start-Sleep -Seconds 8
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:3000/api/health" -UseBasicParsing
            if ($r.StatusCode -ne 200) { throw "health check failed: $($r.StatusCode)" }
            Write-Host "health check OK"
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }
