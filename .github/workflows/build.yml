name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      # Prisma writes its generated client to src/generated/prisma (per
      # generator block in prisma/schema.prisma), which is gitignored, so
      # `npm ci` doesn't materialise it. Tests import from `@/generated/prisma`
      # via the `@` alias in vitest.config.ts, so without this step the path
      # is unresolvable and every test that touches Prisma errors with
      # "Cannot find package '@/generated/prisma'".
      - run: npx prisma generate
      - run: npx vitest run

  lan-zip:
    needs: unit-tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build LAN zip
        shell: bash
        run: npm run zip:lan
      - name: Upload LAN zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: metalu-lan
          path: metalu-lan-*.zip

  lan-zip-smoke:
    needs: lan-zip
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: metalu-lan
          path: dist-server
      - name: Extract zip to a fresh dir
        shell: bash
        run: |
          mkdir -p smoke-target
          # Expand-Archive works on both PowerShell and Git Bash contexts; we
          # use the latter because the step uses `shell: bash`. `unzip` is
          # shipped with Git for Windows.
          unzip -q -o dist-server/metalu-lan-*.zip -d smoke-target
          test -f smoke-target/iniciar.bat || (printf '%s\n' "iniciar.bat missing"; exit 1)
          test -f smoke-target/LEEME.txt || (printf '%s\n' "LEEME.txt missing"; exit 1)
          test -f smoke-target/package.json || (printf '%s\n' "package.json missing"; exit 1)
      - name: Smoke-test the LAN zip through iniciar.bat
        shell: pwsh
        run: |
          $target = (Resolve-Path "smoke-target").Path
          $stdout = Join-Path $target "server.log"
          $stderr = Join-Path $target "server-error.log"
          $process = Start-Process `
            -FilePath "cmd.exe" `
            -ArgumentList "/d", "/c", "iniciar.bat" `
            -WorkingDirectory $target `
            -RedirectStandardOutput $stdout `
            -RedirectStandardError $stderr `
            -PassThru

          try {
            $ready = $false
            for ($i = 1; $i -le 120; $i++) {
              Start-Sleep -Seconds 2
              $process.Refresh()

              if ($process.HasExited) {
                Get-Content $stdout -ErrorAction SilentlyContinue
                Get-Content $stderr -ErrorAction SilentlyContinue
                throw "iniciar.bat exited before the server became ready"
              }

              try {
                Invoke-RestMethod "http://localhost:3000/api/health" -TimeoutSec 5 | Out-Null
                Write-Host "[smoke] health OK after $i ticks"
                $ready = $true
                break
              } catch {
                Write-Host "[smoke] waiting for health endpoint ($i)"
              }
            }

            if (-not $ready) {
              Get-Content $stdout -ErrorAction SilentlyContinue
              Get-Content $stderr -ErrorAction SilentlyContinue
              throw "health endpoint did not become ready within 240s"
            }

            $secretPath = Join-Path $target ".metalu-auth-secret"
            if (-not (Test-Path $secretPath)) {
              throw "iniciar.bat did not create .metalu-auth-secret"
            }

            $secret = (Get-Content $secretPath -Raw).Trim()
            if ($secret -notmatch "^[0-9a-f]{64}$") {
              throw "generated Auth.js secret is invalid"
            }

            $providers = Invoke-RestMethod "http://localhost:3000/api/auth/providers" -TimeoutSec 30
            if ($null -eq $providers.credentials) {
              throw "credentials auth provider is unavailable"
            }

            Start-Sleep -Seconds 1
            $missingSecret = Select-String `
              -Path $stdout, $stderr `
              -Pattern "MissingSecret" `
              -SimpleMatch `
              -ErrorAction SilentlyContinue
            if ($missingSecret) {
              throw "Auth.js reported MissingSecret"
            }

            Write-Host "[smoke] success - iniciar.bat serves health and Auth.js"
          } finally {
            $process.Refresh()
            if (-not $process.HasExited) {
              taskkill.exe /PID $process.Id /T /F | Out-Null
            }
          }
