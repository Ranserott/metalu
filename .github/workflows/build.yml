name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx vitest run
      - run: cd src-tauri-client && cargo test --lib

  build-server:
    needs: unit-tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build:server
      - name: assert exe exists
        run: |
          if (!(Test-Path "dist-server/metalu-server.exe")) {
            Write-Error "metalu-server.exe not produced"
            exit 1
          }
          $size = (Get-Item "dist-server/metalu-server.exe").Length
          Write-Host "metalu-server.exe size: $size bytes"
          if ($size -lt 50MB -or $size -gt 200MB) {
            Write-Error "exe size out of expected range (50-200MB)"
            exit 1
          }
      - uses: actions/upload-artifact@v4
        with:
          name: metalu-server
          path: dist-server/metalu-server.exe

  build-client:
    needs: unit-tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
      - run: cd src-tauri-client && cargo build --release
      - name: assert exe exists
        run: |
          if (!(Test-Path "src-tauri-client/target/release/metalu-client.exe")) {
            Write-Error "metalu-client.exe not produced"
            exit 1
          }
      - uses: actions/upload-artifact@v4
        with:
          name: metalu-client
          path: src-tauri-client/target/release/metalu-client.exe

  smoke:
    needs: [build-server, build-client]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: metalu-server
          path: dist-server
      - name: smoke test server
        run: |
          Start-Process -FilePath "dist-server/metalu-server.exe" -PassThru |
            Tee-Object -Variable proc
          Start-Sleep -Seconds 8
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:3000/api/health" -UseBasicParsing
            if ($r.StatusCode -ne 200) { throw "health check failed: $($r.StatusCode)" }
            Write-Host "health check OK"
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }
