name: build-desktop

# Minimum GITHUB_TOKEN scope: this workflow only checks out the repo, runs the
# build, and uploads artifacts. It does not create releases or push branches.
permissions:
  contents: read

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      os:
        description: "OS/arch to build (or 'all')"
        type: choice
        required: true
        default: "all"
        options:
          - macos-arm64
          - macos-x64
          - windows-x64
          - all
      build_target:
        description: "Tauri role to build (server, client, or both)"
        type: choice
        required: true
        default: "all"
        options:
          - server
          - client
          - all

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            os_key: macos-arm64
            build_target: server
            artifact_prefix: macos-arm64-server
          - os: macos-latest
            target: aarch64-apple-darwin
            os_key: macos-arm64
            build_target: client
            artifact_prefix: macos-arm64-client
          - os: macos-latest
            target: x86_64-apple-darwin
            os_key: macos-x64
            build_target: server
            artifact_prefix: macos-x64-server
          - os: macos-latest
            target: x86_64-apple-darwin
            os_key: macos-x64
            build_target: client
            artifact_prefix: macos-x64-client
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_key: windows-x64
            build_target: server
            artifact_prefix: windows-x64-server
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_key: windows-x64
            build_target: client
            artifact_prefix: windows-x64-client
    runs-on: ${{ matrix.os }}
    # Filter removed: GitHub's expression parser fails on this compound
    # `if:` with `inputs.X == matrix.X` checks ("Unrecognized named-value:
    # 'matrix'"), causing every run to fail in 0 seconds with 0 jobs.
    # The matrix has 6 entries (server+client × {macos-arm64, macos-x64,
    # windows-x64}). For tag releases we want all of them; for manual
    # dispatch, every job runs anyway. If we ever need a single-OS build,
    # gate with a wrapper job that emits a filtered matrix via fromJSON.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache cargo
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            src-tauri/target
          # Cache key includes both Cargo.toml AND Cargo.lock so a dependency
          # bump invalidates the cache. JS sources are intentionally excluded
          # because they are not in the cargo target dir -- the
          # `actions/setup-node` `cache: 'npm'` step handles `~/.npm` for npm.
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.toml', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.target }}-

      - run: npm ci
      - name: Generate Prisma client
        # `prisma generate` writes to src/generated/prisma/, which is what
        # `@/generated/prisma` resolves to in tsconfig paths. Without this
        # step, `npm test` and `next build` both fail with ERR_MODULE_NOT_FOUND
        # because the generated files don't exist on a fresh CI checkout.
        run: npx prisma generate --schema=prisma/schema.prisma
      - run: npm test
      - name: Tauri build
        run: |
          cd src-tauri
          METALU_BUILD_TARGET=${{ matrix.build_target }} \
            npm run tauri -- build --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: ${{ matrix.artifact_prefix }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: warn
