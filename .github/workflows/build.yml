name: build-desktop

# Minimum GITHUB_TOKEN scope: this workflow only checks out the repo, runs the
# build, and uploads artifacts. It does not create releases or push branches.
permissions:
  contents: read

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      os:
        description: "OS/arch to build (or 'all')"
        type: choice
        required: true
        default: "all"
        options:
          - macos-arm64
          - macos-x64
          - windows-x64
          - all
      build_target:
        description: "Tauri role to build (server, client, or both)"
        type: choice
        required: true
        default: "all"
        options:
          - server
          - client
          - all

jobs:
  # Tests run on Linux only because GitHub Actions `services:` is
  # Linux-only. Four suites (runReport, getByDueDate, getBySupplier,
  # markDocumentsAsPaid) need a real Postgres; the remaining suites
  # use pglite. The build jobs below depend on this passing so a
  # broken test never ships in an installer. Re-run the build job
  # individually via workflow_dispatch to bypass when needed.
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: metalu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d metalu_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/metalu_test
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - name: Generate Prisma client
        # `prisma generate` writes to src/generated/prisma/, which is
        # what `@/generated/prisma` resolves to in tsconfig paths.
        # Without this step, tests fail with ERR_MODULE_NOT_FOUND on a
        # fresh CI checkout.
        run: npx prisma generate --schema=prisma/schema.prisma
      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres -d metalu_test; then
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready in time" >&2
          exit 1
      - name: Apply Prisma migrations
        run: npx prisma migrate deploy --schema=prisma/schema.prisma
      - run: npm test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            os_key: macos-arm64
            build_target: server
            artifact_prefix: macos-arm64-server
          - os: macos-latest
            target: aarch64-apple-darwin
            os_key: macos-arm64
            build_target: client
            artifact_prefix: macos-arm64-client
          - os: macos-latest
            target: x86_64-apple-darwin
            os_key: macos-x64
            build_target: server
            artifact_prefix: macos-x64-server
          - os: macos-latest
            target: x86_64-apple-darwin
            os_key: macos-x64
            build_target: client
            artifact_prefix: macos-x64-client
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_key: windows-x64
            build_target: server
            artifact_prefix: windows-x64-server
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_key: windows-x64
            build_target: client
            artifact_prefix: windows-x64-client
    runs-on: ${{ matrix.os }}
    # `npm test` runs in the `test` job on Linux (services on macOS/
    # Windows is impossible). For tag releases we want all of them;
    # for manual dispatch, every job runs anyway.
    env:
      # `src/lib/prisma/prisma.ts` throws at module load if
      # `METALU_RUNTIME != "tauri"` and `DATABASE_URL` is unset.
      # `next build` loads that module transitively (via API
      # route handlers + services), so we must provide a value.
      # The placeholder host is never reached — Prisma connects
      # lazily on the first query, and the CI build never runs
      # one. If you switch to `output: "export"` (full static
      # export) this requirement disappears.
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache cargo
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            src-tauri/target
          # Cache key includes both Cargo.toml AND Cargo.lock so a
          # dependency bump invalidates the cache. JS sources are
          # intentionally excluded because they are not in the cargo
          # target dir -- the `actions/setup-node` `cache: 'npm'` step
          # handles `~/.npm` for npm.
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.toml', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.target }}-

      - name: Add Rust target
        # macos-latest is now Apple Silicon by default and only ships
        # the aarch64-apple-darwin standard library. The matrix also
        # asks it to build x86_64-apple-darwin cross-compiled
        # binaries, so we have to install that target. `rustup target
        # add` is a no-op for the host target, so this step is safe
        # across the whole matrix.
        run: rustup target add ${{ matrix.target }}

      - run: npm ci
      - name: Generate Prisma client
        # `prisma generate` writes to src/generated/prisma/, which is
        # what `@/generated/prisma` resolves to in tsconfig paths.
        # Without this step, `next build` fails with ERR_MODULE_NOT_FOUND
        # because the generated files don't exist on a fresh CI
        # checkout.
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Build Next.js standalone
        # Next.js `output: "standalone"` produces `.next/standalone/`
        # which contains the Node.js server entry (`server.js`) and its
        # bundled deps. Tauri's runtime spawns this server (see
        # `src-tauri/src/server.rs::spawn_next_server`), and we bundle
        # the directory into the installer via
        # `tauri.server.conf.json::bundle.resources`. Skip this step
        # and `server.js` won't exist in the install dir — the app
        # launches but the webview can't reach the API.
        run: npm run build

      - name: Stage standalone for tauri resources
        # Tauri-build's `copy_resources` runs from build.rs's cwd =
        # CARGO_MANIFEST_DIR = `src-tauri/`, and Tauri's `glob::glob`
        # (via the `globset` crate) treats `..` as a literal pattern
        # component — the walker resolves it but the matcher doesn't,
        # so `../.next/standalone/**` never matches anything. Stage a
        # copy of the standalone bundle into src-tauri/ so the resources
        # pattern can stay relative without `..`.
        run: rm -rf src-tauri/.standalone-bundle && cp -r .next/standalone src-tauri/.standalone-bundle

      - name: Tauri build
        # Single-line command with `shell: bash` so it works identically
        # on macOS, Linux, and Windows runners. Windows defaults to
        # PowerShell which doesn't accept the multi-line bash
        # backslash continuation we used before
        # (`ParserError: Missing expression after unary operator '--'`).
        # bash is available on all runner images (Git for Windows on
        # `windows-latest` ships bash.exe on PATH).
        shell: bash
        run: METALU_BUILD_TARGET=${{ matrix.build_target }} npm run tauri -- build --config src-tauri/tauri.${{ matrix.build_target }}.conf.json --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: ${{ matrix.artifact_prefix }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: warn
