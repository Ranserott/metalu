name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      # Prisma writes its generated client to src/generated/prisma (per
      # generator block in prisma/schema.prisma), which is gitignored, so
      # `npm ci` doesn't materialise it. Tests import from `@/generated/prisma`
      # via the `@` alias in vitest.config.ts, so without this step the path
      # is unresolvable and every test that touches Prisma errors with
      # "Cannot find package '@/generated/prisma'".
      - run: npx prisma generate
      - run: npx vitest run

  lan-zip:
    needs: unit-tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build LAN zip
        shell: bash
        run: npm run zip:lan
      - name: Upload LAN zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: metalu-lan
          path: metalu-lan-*.zip

  lan-zip-smoke:
    needs: lan-zip
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: metalu-lan
          path: dist-server
      - name: Extract zip to a fresh dir
        shell: bash
        run: |
          mkdir -p smoke-target
          # Expand-Archive works on both PowerShell and Git Bash contexts; we
          # use the latter because the step uses `shell: bash`. `unzip` is
          # shipped with Git for Windows.
          unzip -q -o dist-server/metalu-lan-*.zip -d smoke-target
          ls smoke-target
          test -f smoke-target/iniciar.bat || (Write-Error "iniciar.bat missing"; exit 1)
          test -f smoke-target/LEEME.txt || (Write-Error "LEEME.txt missing"; exit 1)
          test -f smoke-target/package.json || (Write-Error "package.json missing"; exit 1)
      - name: Smoke-test the LAN zip (fresh clone → dev server → health)
        shell: bash
        run: |
          cd smoke-target

          echo "[smoke] npm install"
          npm install --no-audit --no-fund --loglevel=error

          echo "[smoke] prisma generate"
          npx prisma generate

          echo "[smoke] starting dev server"
          export METALU_RUNTIME=tauri
          export HOSTNAME=0.0.0.0
          # Spawn the dev server detached so we can curl /api/health while
          # it boots. Redirect output to a log for post-mortem.
          rm -f server.log
          (npm run dev > server.log 2>&1 &)
          SERVER_PID=$!
          echo "[smoke] dev server pid=$SERVER_PID"

          ready=false
          for i in $(seq 1 90); do
            sleep 2
            if curl -fsS http://localhost:3000/api/health > health.json 2>/dev/null; then
              echo "[smoke] health OK after ${i} ticks"
              cat health.json
              echo
              ready=true
              break
            fi
            # Detect crash early
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "[smoke] dev server process exited unexpectedly"
              cat server.log
              exit 1
            fi
            echo "[smoke] waiting for health endpoint (${i})"
          done

          if [ "$ready" != "true" ]; then
            echo "[smoke] health endpoint did not become ready within 180s"
            echo "=== last 100 lines of server.log ==="
            tail -100 server.log
            # Kill the still-running dev server
            pkill -f "next dev" || true
            pkill -f "next-server" || true
            exit 1
          fi

          echo "[smoke] success — zip boots and serves /api/health on localhost"
          pkill -f "next dev" || true
          pkill -f "next-server" || true
